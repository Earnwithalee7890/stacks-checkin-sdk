name: Publish to GitHub Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-gpr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@earnwithalee'
      - run: npm install
      - name: Rename package for GitHub Packages
        run: |
          node -e "const pkg = require('./package.json'); pkg.name = '@earnwithalee7890/stacks-checkin-sdk'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2))"
      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
