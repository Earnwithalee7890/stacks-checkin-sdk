name: NPM Download Booster

on:
  schedule:
    - cron: "*/15 * * * *" # Runs every 15 minutes
  workflow_dispatch:
    inputs:
      install_count:
        description: 'Number of times to run npm install'
        required: true
        default: '50'

jobs:
  boost:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Run NPM Installs
        run: |
          COUNT=${{ github.event.inputs.install_count || '15' }}
          echo "Running $COUNT installs for @earnwithalee/stacks-checkin-sdk..."
          for i in $(seq 1 $COUNT); do
            echo "Installation attempt $i..."
            mkdir temp-test-$i
            cd temp-test-$i
            npm init -y > /dev/null 2>&1
            npm install @earnwithalee/stacks-checkin-sdk@latest --no-fund --no-audit > /dev/null 2>&1
            cd ..
            rm -rf temp-test-$i
            sleep 2
          done
          echo "Boost complete."
